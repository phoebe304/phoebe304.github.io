<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px 50px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        h1 { font-size: 2em; margin-bottom: 10px; color: #667eea; }
        p { font-size: 1.1em; line-height: 1.8; color: #666; margin-bottom: 20px; }
        .links a {
            display: inline-block;
            margin: 5px 10px;
            padding: 10px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .links a:hover { background: #764ba2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>你好，欢迎来到我的网站！</h1>
        <p>希望对你有帮助<p>
        <p>敬请期待<p>
        <div class="links">
            <a href="https://github.com">我的 GitHub</a>
            <a href="mailto:your@email.com">联系我</a>
        </div>
    </div>
</body>
</html>
