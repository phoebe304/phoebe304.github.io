<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px 50px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        h1 { color: #667eea; margin-bottom: 20px; }
        .project {
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .project h3 { color: #333; margin-bottom: 8px; }
        .project p { color: #666; line-height: 1.6; }
        .back { display: inline-block; margin-top: 20px; color: #667eea; text-decoration: none; }
        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>我的作品集</h1>
        <div class="project">
            <h3>项目一：个人博客</h3>
            <p>分享技术文章和生活感悟。</p>
        </div>
        <div class="project">
            <h3>项目二：摄影集</h3>
            <p>记录旅行中的风景和人文，用镜头讲述故事。</p>
        </div>
        <a href="index.html" class="back">← 返回首页</a>
    </div>
</body>
</html>
